<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FunnelAfrica — Vendez en ligne avec Mobile Money</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/js/config.js"></script>
<style>
  body{margin:0;background:#070b0f;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'DM Sans',sans-serif;}
  .spinner{width:40px;height:40px;border:3px solid #1a2530;border-top-color:#00e5a0;border-radius:50%;animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="spinner"></div>
<script>
  var SUPABASE_URL      = window.__FA_SUPABASE_URL      || 'https://crfmdpvxiabwlhgrwcro.supabase.co';
  var SUPABASE_ANON_KEY = window.__FA_SUPABASE_ANON_KEY || 'VOTRE_ANON_KEY';
  var sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  sb.auth.getUser().then(function(r) {
    if (!r.data.user) {
      // Pas connecté → landing page
      window.location.href = '/landing.html';
      return;
    }
    // Connecté → vérifier onboarding
    sb.from('profiles').select('onboarded,role').eq('id', r.data.user.id).single().then(function(pr) {
      var p = pr.data;
      if (!p || !p.onboarded) {
        // Pas encore onboardé → onboarding
        window.location.href = '/onboarding.html';
      } else if (p.role === 'admin' || r.data.user.email === 'kessahoud@gmail.com') {
        // CEO → admin
        window.location.href = '/admin.html';
      } else {
        // Vendeur → dashboard
        window.location.href = '/funnelafrica-dashboard.html';
      }
    });
  });
</script>
</body>
</html>
